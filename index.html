<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하루 한 물음</title>
<meta name="description" content="매일 하나의 질문을 마주하고, 먹을 문질러 답을 드러내는 사색의 공간">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="site-header">
      <p class="eyebrow">하루 한 물음</p>
      <p class="date" id="dateLabel"></p>
    </header>

    <main class="stage">
      <section class="question-block">
        <p class="question" id="question"></p>
      </section>

      <section class="reveal-block">
        <p class="instruction" id="instruction">붓끝으로 먹을 문질러, 답을 드러내 보세요</p>
        <div class="canvas-wrap" id="canvasWrap">
          <div class="answer-layer">
            <p class="answer" id="answer"></p>
            <p class="attribution" id="attribution"></p>
            <svg class="seal" id="seal" viewBox="0 0 44 44" aria-hidden="true">
              <defs>
                <filter id="sealRough" x="-30%" y="-30%" width="160%" height="160%">
                  <feTurbulence type="fractalNoise" baseFrequency="0.2" numOctaves="2" seed="7" result="noise"></feTurbulence>
                  <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.4"></feDisplacementMap>
                </filter>
              </defs>
              <rect x="5" y="5" width="34" height="34" rx="1" class="seal-body" filter="url(#sealRough)"></rect>
              <text x="22" y="20" text-anchor="middle" class="seal-char">一</text>
              <text x="22" y="36" text-anchor="middle" class="seal-char">問</text>
            </svg>
          </div>
          <canvas id="inkCanvas" aria-label="문질러서 답을 드러내는 먹 화면"></canvas>
        </div>
        <button class="fallback-btn" id="fallbackBtn" type="button">그냥 볼게요</button>

        <div class="share-row" id="shareRow">
          <span class="share-label">오늘의 물음 나누기</span>
          <div class="share-buttons">
            <button class="share-btn share-kakao" id="shareKakao" type="button" aria-label="카카오톡으로 공유">
              <svg viewBox="0 0 28 28" aria-hidden="true">
                <path d="M14 6c-5.2 0-9.4 3.2-9.4 7.2 0 2.5 1.7 4.7 4.2 6l-1 3.6c-.1.4.3.7.6.5l4.2-2.6c.5 0 .9.1 1.4.1 5.2 0 9.4-3.2 9.4-7.2S19.2 6 14 6z" class="share-kakao-glyph"></path>
              </svg>
            </button>
            <button class="share-btn share-facebook" id="shareFacebook" type="button" aria-label="페이스북으로 공유">
              <svg viewBox="0 0 28 28" aria-hidden="true">
                <circle cx="14" cy="14" r="14" class="share-facebook-bg"></circle>
                <path d="M16.1 22v-7.1h2.4l.4-2.8h-2.8v-1.8c0-.8.2-1.3 1.4-1.3h1.5V6.5c-.3 0-1.2-.1-2.2-.1-2.2 0-3.7 1.3-3.7 3.8v2.1h-2.4v2.8h2.4V22h3z" class="share-facebook-glyph"></path>
              </svg>
            </button>
            <button class="share-btn share-link" id="shareLink" type="button" aria-label="링크 복사">
              <svg viewBox="0 0 28 28" aria-hidden="true">
                <path d="M12.2 15.8a3.6 3.6 0 0 0 5.1.2l2.6-2.6a3.6 3.6 0 0 0-5.1-5.1l-1.5 1.5" class="share-link-glyph"></path>
                <path d="M15.8 12.2a3.6 3.6 0 0 0-5.1-.2l-2.6 2.6a3.6 3.6 0 0 0 5.1 5.1l1.5-1.5" class="share-link-glyph"></path>
              </svg>
            </button>
          </div>
          <span class="share-toast" id="shareToast" role="status" aria-live="polite"></span>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <button id="shuffleBtn" type="button" class="ghost-btn">다른 질문 보기</button>
      <p class="footnote">하루 한 물음 · 동서양 철학자 21인의 물음</p>
    </footer>
  </div>

  <script src="quotes.js"></script>
  <script src="script.js"></script>
</body>
</html>
